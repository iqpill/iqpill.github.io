<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iqpill</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- BACKGROUND VIDEO --- */
        .bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; filter: brightness(0.4) blur(2px);
        }

        /* --- ANDY INTRO ANIMATION --- */
        #intro-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Fades out after 2.5 seconds */
            animation: fadeOutIntro 1s forwards 2.5s;
            pointer-events: none;
        }

        .glitch-text {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -2px;
            color: white;
            position: relative;
            animation: glitch-anim 0.3s infinite;
            text-shadow: 2px 2px #8b5cf6, -2px -2px #ff0055;
        }

        /* --- MAIN CARD --- */
        .card {
            width: 90%;
            max-width: 400px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index: 10;
            opacity: 0; /* Hidden initially */
            /* Slides up after intro finishes (2.5s) */
            animation: slideUp 0.8s forwards 2.5s;
        }

        /* --- AVATAR & STATUS --- */
        .avatar-container {
            position: relative;
            width: 110px; height: 110px;
            margin: 0 auto 1.5rem auto;
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #333;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .card:hover .avatar { border-color: #8b5cf6; box-shadow: 0 0 20px rgba(139,92,246,0.4); }

        .status-dot {
            position: absolute; bottom: 5px; right: 5px;
            width: 18px; height: 18px;
            background: #10b981;
            border: 3px solid #1a1a1a;
            border-radius: 50%;
        }

        /* --- TEXT --- */
        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.2rem; letter-spacing: -0.5px; }
        .handle { color: #8b5cf6; font-weight: 600; font-size: 0.95rem; margin-bottom: 2rem; }

        /* --- LINKS --- */
        .links { display: flex; flex-direction: column; gap: 10px; }
        .link {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 14px 18px;
            border-radius: 12px;
            text-decoration: none; color: #fff; transition: 0.2s;
        }
        .link-left { display: flex; align-items: center; gap: 12px; }
        .link-text { font-weight: 600; font-size: 0.95rem; }
        .link-sub { display: block; font-size: 0.75rem; color: #777; }
        .link:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }

        /* --- ANIMATIONS --- */
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        @keyframes fadeOutIntro { to { opacity: 0; visibility: hidden; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 400px) {
            .glitch-text { font-size: 3.5rem; }
        }
    </style>
</head>
